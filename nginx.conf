# HTTP -> HTTPS 强制跳转
server {
    listen 80;
    server_name mineclaw.top;
    return 301 https://$host$request_uri;
}

# HTTPS 服务
server {
    listen 443 ssl;
    server_name mineclaw.top;

    # SSL 证书路径（需要先用certbot申请）
    ssl_certificate     /etc/letsencrypt/live/mineclaw.top/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/mineclaw.top/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # 上传文件大小限制
    client_max_body_size 50M;

    # 根路径：官方网页（静态文件）
    location / {
        root /var/www/petmarketing-website;
        index index.html;
        try_files $uri $uri/ /index.html;  # SPA路由支持
        expires 1d;
        add_header Cache-Control "public, immutable";
        
        # 安全头
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
    }

    # 反向代理到 FastAPI 后端
    location /api/ {
        proxy_pass         http://127.0.0.1:8000;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;   # AI 生成最长等 2 分钟
        
        # CORS 支持（如果需要）
        add_header Access-Control-Allow-Origin *;
        add_header Access-Control-Allow-Methods 'GET, POST, OPTIONS';
        add_header Access-Control-Allow-Headers 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization';
    }

    # 后端生成的图片静态文件
    location /static/ {
        alias /app/storage/;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # 健康检查
    location /health {
        proxy_pass http://127.0.0.1:8000;
    }
}
